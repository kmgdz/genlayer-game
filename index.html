<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
    const origDefineProperty = Object.defineProperty;
    Object.defineProperty = function(target, prop, descriptor) {
      try {
        return origDefineProperty(target, prop, descriptor);
      } catch (e) {
        if (typeof prop === 'string' && (prop.startsWith('is') || prop === 'isZerion')) {
          console.warn('Caught defineProperty error for', prop);
          return target;
        }
        throw e;
      }
    };
    if (typeof Reflect !== 'undefined') {
      const origReflectDefineProperty = Reflect.defineProperty;
      Reflect.defineProperty = function(target, prop, descriptor) {
        try {
          return origReflectDefineProperty(target, prop, descriptor);
        } catch (e) {
          if (typeof prop === 'string' && prop.startsWith('is')) {
            console.warn('Caught Reflect.defineProperty error for', prop);
            return false;
          }
          throw e;
        }
      };
    }
    window.addEventListener('error', function(e) {
      if (e.message && e.message.includes('redefine property') && (e.message.includes('isZerion') || e.message.includes('isMetamask') || e.message.includes('isBrave'))) {
        e.preventDefault();
        e.stopPropagation();
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      if (e.reason && e.reason.message && e.reason.message.includes('redefine property') && e.reason.message.includes('isZerion')) {
        e.preventDefault();
      }
    });
  </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
